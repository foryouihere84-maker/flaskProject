<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模型管理</title>
    <!-- Google Fonts - 使用 Inter 字体，现代且易读 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 图标库 (免费版) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #f6f9fc 0%, #e9f2f9 100%);
            min-height: 100vh;
            padding: 2rem 1.5rem;
            line-height: 1.5;
            color: #1e293b;
        }

        /* 主容器 */
        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }

        /* 头部区域 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding: 0 1rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #0f2b3d, #1b4a6b, #2c5f8a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 50px;
            padding: 0.8rem 1.8rem;
            font-weight: 600;
            color: #0c2b3e;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            box-shadow: 0 8px 18px -6px rgba(0,60,120,0.2);
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: #1e4a6b;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 12px 22px -8px #1e4a6b80;
        }

        /* 控制面板 */
        .control-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .stats {
            display: flex;
            gap: 2rem;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1e4a6b;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #475569;
            margin-top: 0.2rem;
        }

        .refresh-btn {
            background: #1e4a6b;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(30, 74, 107, 0.3);
        }

        .refresh-btn:hover {
            background: #0c2b3e;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(30, 74, 107, 0.4);
        }

        /* 模型列表容器 */
        .models-container {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #0c2b3e;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .section-title i {
            color: #1e4a6b;
        }

        /* 模型列表 */
        .models-list {
            display: grid;
            gap: 1.2rem;
        }

        /* 模型卡片 */
        .model-card {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(30, 74, 107, 0.1);
            border-radius: 1rem;
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }

        .model-card:hover {
            background: rgba(255, 255, 255, 0.8);
            border-color: rgba(30, 74, 107, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px -4px rgba(0, 0, 0, 0.1);
        }

        .model-info {
            flex: 1;
        }

        .model-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #0c2b3e;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .model-name i {
            color: #1e4a6b;
        }

        .model-details {
            display: flex;
            gap: 1.5rem;
            color: #475569;
            font-size: 0.9rem;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .detail-item i {
            font-size: 0.8rem;
        }

        .model-actions {
            display: flex;
            gap: 0.8rem;
        }

        .delete-btn {
            background: #dc2626;
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            transition: all 0.2s;
            box-shadow: 0 4px 8px rgba(220, 38, 38, 0.3);
        }

        .delete-btn:hover {
            background: #b91c1c;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(220, 38, 38, 0.4);
        }
        
        .export-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            transition: all 0.2s;
            box-shadow: 0 4px 8px rgba(16, 185, 129, 0.3);
        }
        
        .export-btn:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(16, 185, 129, 0.4);
        }
        
        /* 修改模型操作区域的间距 */
        .model-actions {
            display: flex;
            gap: 0.8rem;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            color: #475569;
        }

        .empty-state i {
            font-size: 4rem;
            color: #cbd5e1;
            margin-bottom: 1rem;
        }

        .empty-state h3 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #334155;
        }

        .empty-state p {
            font-size: 1rem;
            max-width: 500px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* 加载动画 */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 悬浮确认框样式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .confirm-modal {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 1.5rem;
            padding: 2.5rem;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .confirm-modal {
            transform: scale(1);
        }

        .modal-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .modal-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(145deg, #fee2e2, #fecaca);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            box-shadow: 0 8px 16px rgba(220, 38, 38, 0.2);
        }

        .modal-icon i {
            font-size: 1.8rem;
            color: #dc2626;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0c2b3e;
            margin-bottom: 0.5rem;
        }

        .modal-message {
            color: #475569;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .modal-model-name {
            font-weight: 600;
            color: #1e4a6b;
            background: rgba(30, 74, 107, 0.1);
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            display: inline-block;
            margin: 0 0.2rem;
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .modal-btn {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-cancel {
            background: rgba(203, 213, 225, 0.6);
            color: #334155;
        }

        .btn-cancel:hover {
            background: #cbd5e1;
            transform: translateY(-2px);
        }

        .btn-confirm {
            background: linear-gradient(145deg, #dc2626, #b91c1c);
            color: white;
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
        }

        .btn-confirm:hover {
            background: linear-gradient(145deg, #b91c1c, #991b1b);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(220, 38, 38, 0.4);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 1.5rem;
                text-align: center;
            }
            
            .control-panel {
                flex-direction: column;
                gap: 1.5rem;
            }
            
            .stats {
                justify-content: center;
            }
            
            .model-card {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }
            
            .model-details {
                justify-content: center;
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1><i class="fas fa-database"></i> 模型管理</h1>
            <a href="/" class="back-btn">
                <i class="fas fa-arrow-left"></i> 返回首页
            </a>
        </div>

        <!-- 控制面板 -->
        <div class="control-panel">
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-number" id="model-count">{{ models|length }}</div>
                    <div class="stat-label">训练模型数量</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="total-size">0 MB</div>
                    <div class="stat-label">总占用空间</div>
                </div>
            </div>
            <button class="refresh-btn" onclick="refreshModels()">
                <i class="fas fa-sync-alt"></i> 刷新列表
            </button>
        </div>

        <!-- 模型列表 -->
        <div class="models-container">
            <h2 class="section-title">
                <i class="fas fa-cube"></i> 训练模型列表
            </h2>
            
            {% if models %}
                <div class="models-list" id="models-list">
                    {% for model in models %}
                        <div class="model-card" data-model="{{ model.name }}">
                            <div class="model-info">
                                <div class="model-name">
                                    <i class="fas fa-file-alt"></i>
                                    {{ model.name }}
                                </div>
                                <div class="model-details">
                                    <div class="detail-item">
                                        <i class="fas fa-weight-hanging"></i>
                                        {{ model.size }}
                                    </div>
                                    <div class="detail-item">
                                        <i class="fas fa-file"></i>
                                        {{ model.filename }}
                                    </div>
                                </div>
                            </div>
                            <div class="model-actions">
                                <button class="export-btn" onclick="exportModel('{{ model.name }}')">
                                    <i class="fas fa-download"></i> 导出
                                </button>
                                <button class="delete-btn" onclick="deleteModel('{{ model.name }}')">
                                    <i class="fas fa-trash-alt"></i> 删除
                                </button>
                            </div>
                        </div>
                    {% endfor %}
                </div>
            {% else %}
                <div class="empty-state">
                    <i class="fas fa-inbox"></i>
                    <h3>暂无训练模型</h3>
                    <p>当前 detection 目录下没有找到包含 "trained" 关键词的模型文件。您可以在这里管理您的训练模型，包括导出和删除操作。</p>
                </div>
            {% endif %}
        </div>
    </div>

    <!-- 删除确认模态框 -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeDeleteConfirm()">
        <div class="confirm-modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <div class="modal-icon">
                    <i class="fas fa-exclamation-triangle"></i>
                </div>
                <h2 class="modal-title">确认删除</h2>
                <p class="modal-message">
                    确定要删除模型 <span class="modal-model-name" id="modelNameDisplay"></span> 吗？
                    <br><small style="color: #ef4444; font-weight: 500;">此操作不可撤销！</small>
                </p>
            </div>
            <div class="modal-buttons">
                <button class="modal-btn btn-cancel" onclick="closeDeleteConfirm()">
                    <i class="fas fa-times"></i> 取消
                </button>
                <button class="modal-btn btn-confirm" onclick="confirmDelete()">
                    <i class="fas fa-check"></i> 确认删除
                </button>
            </div>
        </div>
    </div>

    <script>
        // 页面加载完成后计算总大小
        document.addEventListener('DOMContentLoaded', function() {
            calculateTotalSize();
        });

        function calculateTotalSize() {
            const models = {{ models | tojson }};
            let totalBytes = 0;
            
            models.forEach(model => {
                totalBytes += model.raw_size || 0;
            });
            
            const sizeElement = document.getElementById('total-size');
            if (sizeElement) {
                sizeElement.textContent = formatFileSize(totalBytes);
            }
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
            return (bytes / (1024 * 1024 * 1024)).toFixed(1) + ' GB';
        }

        function refreshModels() {
            const refreshBtn = document.querySelector('.refresh-btn');
            const originalText = refreshBtn.innerHTML;
            
            // 显示加载状态
            refreshBtn.innerHTML = '<span class="loading"></span> 刷新中...';
            refreshBtn.disabled = true;
            
            fetch('/model-management/refresh')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        location.reload();
                    } else {
                        alert('刷新失败: ' + data.message);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('刷新失败，请稍后重试');
                })
                .finally(() => {
                    // 恢复按钮状态
                    refreshBtn.innerHTML = originalText;
                    refreshBtn.disabled = false;
                });
        }

        // 存储当前要删除的模型信息
        let currentDeleteModel = null;

        function showDeleteConfirm(modelName) {
            currentDeleteModel = modelName;
            const modal = document.getElementById('confirmModal');
            const overlay = document.getElementById('modalOverlay');
            const modelDisplay = document.getElementById('modelNameDisplay');
            
            modelDisplay.textContent = modelName;
            overlay.classList.add('active');
        }

        function closeDeleteConfirm() {
            const overlay = document.getElementById('modalOverlay');
            overlay.classList.remove('active');
            currentDeleteModel = null;
        }

        function confirmDelete() {
            if (!currentDeleteModel) return;
            
            const modelName = currentDeleteModel;
            closeDeleteConfirm();
            
            // 找到对应的删除按钮
            const modelCard = document.querySelector(`[data-model="${modelName}"]`);
            const deleteBtn = modelCard ? modelCard.querySelector('.delete-btn') : null;
            
            if (deleteBtn) {
                const originalText = deleteBtn.innerHTML;
                
                // 显示加载状态
                deleteBtn.innerHTML = '<span class="loading"></span>';
                deleteBtn.disabled = true;
                
                fetch(`/model-management/delete/${modelName}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        // 移除被删除的模型卡片
                        if (modelCard) {
                            modelCard.style.opacity = '0';
                            modelCard.style.transform = 'translateX(-100%)';
                            setTimeout(() => {
                                modelCard.remove();
                                updateStats();
                            }, 300);
                        }
                        // 显示成功消息
                        showMessage(data.message, 'success');
                    } else {
                        showMessage('删除失败: ' + data.message, 'error');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    showMessage('删除失败，请稍后重试', 'error');
                })
                .finally(() => {
                    // 恢复按钮状态
                    if (deleteBtn) {
                        deleteBtn.innerHTML = originalText;
                        deleteBtn.disabled = false;
                    }
                });
            }
        }

        function deleteModel(modelName) {
            showDeleteConfirm(modelName);
        }
        
        function exportModel(modelName) {
            try {
                // 显示导出提示
                showMessage(`正在准备导出模型 ${modelName}...`, 'info');
                
                // 创建临时链接触发下载
                const link = document.createElement('a');
                link.href = `/model-management/export/${modelName}`;
                link.download = `${modelName}.pt`;
                link.style.display = 'none';
                
                // 添加到DOM并触发点击
                document.body.appendChild(link);
                link.click();
                
                // 清理
                document.body.removeChild(link);
                
                // 显示成功消息
                setTimeout(() => {
                    showMessage(`模型 ${modelName} 导出成功！浏览器将开始下载。`, 'success');
                }, 1000);
                
            } catch (error) {
                console.error('Export error:', error);
                showMessage('导出失败，请稍后重试', 'error');
            }
        }

        function showMessage(message, type = 'info') {
            // 创建消息元素
            const messageEl = document.createElement('div');
            messageEl.className = `message-toast ${type}`;
            messageEl.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i>
                <span>${message}</span>
            `;
            
            // 添加样式
            Object.assign(messageEl.style, {
                position: 'fixed',
                top: '20px',
                right: '20px',
                backgroundColor: type === 'success' ? 'rgba(34, 197, 94, 0.9)' : 
                               type === 'error' ? 'rgba(239, 68, 68, 0.9)' : 'rgba(59, 130, 246, 0.9)',
                color: 'white',
                padding: '1rem 1.5rem',
                borderRadius: '12px',
                boxShadow: '0 10px 25px rgba(0,0,0,0.2)',
                zIndex: '3000',
                display: 'flex',
                alignItems: 'center',
                gap: '0.8rem',
                fontWeight: '500',
                backdropFilter: 'blur(10px)',
                transform: 'translateX(100%)',
                transition: 'transform 0.3s ease'
            });
            
            document.body.appendChild(messageEl);
            
            // 显示动画
            setTimeout(() => {
                messageEl.style.transform = 'translateX(0)';
            }, 100);
            
            // 自动隐藏
            setTimeout(() => {
                messageEl.style.transform = 'translateX(100%)';
                setTimeout(() => {
                    document.body.removeChild(messageEl);
                }, 300);
            }, 3000);
        }

        function updateStats() {
            const modelCards = document.querySelectorAll('.model-card');
            const countElement = document.getElementById('model-count');
            if (countElement) {
                countElement.textContent = modelCards.length;
            }
            calculateTotalSize();
        }
    </script>
</body>
</html>
